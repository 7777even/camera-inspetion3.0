# Enviro Brain 主配置文件
spring:
  profiles:
    active: dev

# 通用配置
server:
  port: 8080

# API Key（默认值，各 profile 可覆盖）
enviro:
  api:
    key: dev-api-key-2026
  hikvision:
    host: ${HIKVISION_HOST:}
    port: 443
    app-key: ${HIKVISION_APP_KEY:}
    app-secret: ${HIKVISION_APP_SECRET:}
    api-path: /artemis
    timeout: 15
    retry-count: 3
    warmup-seconds: 5.0
  python:
    path: python3
    script-path: scripts/camera_capture.py
  screenshots:
    dir: ./screenshots
  ledger:
    dir: ./ledger
    template-path: templates/危废仓库巡查台账_新模版.docx
  feishu:
    webhook-url: ${FEISHU_WEBHOOK_URL:}
  queqiao:
    callback-url: ${QUEQIAO_CALLBACK_URL:}
  inspection:
    concurrency: 4
    capture-timeout-seconds: 60

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.enviro.brain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
