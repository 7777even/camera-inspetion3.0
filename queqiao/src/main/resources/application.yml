# 鹊桥数据同步层 主配置文件
spring:
  profiles:
    active: dev
  ai:
    mcp:
      server:
        enabled: true
        # 注意：实际解析依赖为 Spring AI 1.0.0 + MCP Java SDK 0.10.0，其 spring-webmvc 模块仅支持
        # SSE 传输（WebMvcSseServerTransportProvider），不支持 streamable-http 服务端传输；
        # transport 合法取值为 WEBMVC / WEBFLUX（非 streamable-http），故此处使用 WEBMVC(SSE)。
        # 在 0.10.0 中，SSE 端点以 functional RouterFunction 注册，路由路径 = sse-endpoint /
        # sse-message-endpoint 本身（base-url 仅用于拼装 endpoint 事件下发的相对路径，
        # 不会前缀到路由上）。因此最终端点为：GET {sse-endpoint}（SSE 流）、
        # POST {base-url}{sse-message-endpoint}?sessionId=xxx（JSON-RPC 消息）。
        # 注：base-url 必须为空字符串，否则 endpoint 事件下发的 POST 路径与实际 RouterFunction
        # 路由不一致，会导致客户端 POST 到 404 路径，握手失败（MCP SDK 0.10.0 + Spring AI 1.0.0
        # 已知行为，参见 .workbuddy/memory/2026-07-07.md）。
        base-url: ""
        transport: WEBMVC
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message

server:
  port: 8081

# 环保小脑连接配置（同步拉取用）
enviro-brain:
  base-url: ${ENVIRO_BRAIN_BASE_URL:http://localhost:8080}
  api-key: ${ENVIRO_BRAIN_API_KEY:dev-api-key-2026}

# 鹊桥同步层配置
queqiao:
  sync:
    # 每 30 分钟触发一轮增量同步（Spring cron：秒 分 时 日 月 周）
    cron: "0 */30 * * * *"
    # 每轮单表单次拉取上限
    batch-limit: 200
  notify:
    # 接收环保小脑回调通知时校验的 API Key
    api-key: ${QUEQIAO_NOTIFY_API_KEY:queqiao-notify-key-2026}
  mcp:
    # MCP 端点自身鉴权：默认关闭（外部网关已做 Bearer 校验）
    auth:
      enabled: false
      api-key: ${QUEQIAO_MCP_API_KEY:}

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.queqiao.sync.entity
  configuration:
    map-underscore-to-camel-case: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
